<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANHOLE ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --surface2: #18181f;
    --border: #2a2a35;
    --accent: #00d4ff;
    --accent2: #7b61ff;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --danger: #ff4466;
    --green: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,212,255,0.012) 40px, rgba(0,212,255,0.012) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,212,255,0.012) 40px, rgba(0,212,255,0.012) 41px);
    pointer-events: none;
    z-index: 0;
  }

  /* Loading screen */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    transition: opacity 0.5s;
  }

  #loading-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.3em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .loading-bar-wrap {
    width: 280px;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 10px var(--accent);
  }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Error screen */
  #error-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9998;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 2rem;
    text-align: center;
  }

  #error-screen .err-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--danger);
    letter-spacing: 0.2em;
  }

  #error-screen .err-msg {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.8;
  }

  .retry-btn {
    margin-top: 1rem;
    padding: 0.6rem 1.5rem;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.1em;
  }

  .retry-btn:hover { background: var(--accent); color: var(--bg); }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,12,0.94);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.2em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }

  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .live-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--green);
    border: 1px solid rgba(0,255,136,0.3);
    padding: 3px 10px;
    background: rgba(0,255,136,0.05);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .stat-pill {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 4px 12px;
    background: rgba(0,212,255,0.05);
  }

  /* Main */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* Hero stats */
  .hero-stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .hero-stat {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    text-align: center;
    transition: background 0.2s;
  }

  .hero-stat:hover { background: var(--surface2); }

  .hero-stat .value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: var(--accent);
    line-height: 1;
  }

  .hero-stat .label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  select.filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.8rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select.filter-select:focus { border-color: var(--accent); }

  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
  }

  .view-btn {
    padding: 0.5rem 0.8rem;
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }

  .view-btn:last-child { border-right: none; }
  .view-btn.active { background: var(--accent); color: var(--bg); }

  /* Prefecture sections */
  .prefecture-section { margin-bottom: 1.5rem; }

  .prefecture-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.7rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    cursor: pointer;
    transition: background 0.2s;
    user-select: none;
  }

  .prefecture-header:hover { background: var(--surface2); }

  .pref-area {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent2);
    background: rgba(123,97,255,0.1);
    border: 1px solid rgba(123,97,255,0.3);
    padding: 1px 6px;
  }

  .prefecture-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.08em;
  }

  .prefecture-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.25);
    padding: 2px 8px;
  }

  .collapse-icon {
    margin-left: auto;
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.3s;
  }

  .prefecture-section.collapsed .collapse-icon { transform: rotate(-90deg); }
  .prefecture-section.collapsed .cards-grid,
  .prefecture-section.collapsed .cards-list { display: none; }

  /* Grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-top: none;
  }

  .card-item {
    background: var(--surface);
    padding: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card-item:hover { background: var(--surface2); }
  .card-item:hover::before { opacity: 1; }

  /* Manhole circle design */
  .transfer-mark {
    position: absolute;
    top: 7px;
    right: 7px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--green);
    color: #000;
    font-size: 0.55rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    box-shadow: 0 0 8px rgba(0,255,136,0.5);
    z-index: 2;
  }

  .card-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin: 0 auto 0.75rem;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    position: relative;
    background: radial-gradient(circle at 30% 30%, var(--surface2), var(--bg));
    transition: border-color 0.3s;
    overflow: hidden;
  }

  .card-circle img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 8px;
    filter: brightness(0.85) saturate(0.7);
    transition: filter 0.3s;
  }

  .card-item:hover .card-circle img { filter: brightness(1.1) saturate(1); }
  .card-item:hover .card-circle { border-color: var(--accent); }

  .card-circle::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px solid var(--border);
    transition: border-color 0.3s;
    pointer-events: none;
  }

  .card-item:hover .card-circle::after { border-color: rgba(0,212,255,0.3); }

  .card-city {
    font-size: 0.88rem;
    font-weight: 500;
    margin-bottom: 3px;
    text-align: center;
  }

  .card-code {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-align: center;
    margin-bottom: 2px;
  }

  .card-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
  }

  .card-acquire-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    text-align: center;
    margin-top: 3px;
  }

  .card-badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 6px;
  }

  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    padding: 1px 5px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .badge.acquired {
    border-color: rgba(0,212,255,0.4);
    color: var(--accent);
    background: rgba(0,212,255,0.05);
  }

  /* List view */
  .cards-list {
    border: 1px solid var(--border);
    border-top: none;
  }

  .list-item {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 1rem;
    align-items: center;
    padding: 0.65rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    cursor: default;
    transition: background 0.2s;
  }

  .list-item:last-child { border-bottom: none; }
  .list-item:hover { background: var(--surface2); }

  .list-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    background: radial-gradient(circle, var(--surface2), var(--bg));
    flex-shrink: 0;
  }

  .list-city { font-weight: 500; font-size: 0.9rem; margin-bottom: 2px; }

  .list-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .list-right {
    text-align: right;
    flex-shrink: 0;
  }

  .list-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .list-lot {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    color: var(--accent);
  }

  /* Empty */
  .empty-state {
    text-align: center;
    padding: 3rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
  }

  /* Scanline */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
    animation: scan 6s linear infinite;
    pointer-events: none;
    z-index: 9999;
  }

  @keyframes scan {
    0% { top: 0; opacity: 0.4; }
    50% { opacity: 0.1; }
    100% { top: 100vh; opacity: 0.4; }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .hero-stats { grid-template-columns: repeat(3, 1fr); }
    .hero-stats .hero-stat:nth-child(4),
    .hero-stats .hero-stat:nth-child(5) { grid-column: span 1; }
    header { padding: 0 1rem; }
    .container { padding: 1rem; }
    .logo { font-size: 1.4rem; }
    .live-badge { display: none; }
  }
</style>
</head>
<body>

<div class="scanline"></div>

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-logo">MANHOLE ARCHIVE</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loading-bar"></div>
  </div>
  <div class="loading-text" id="loading-text">CONNECTING TO DATABASE...</div>
</div>

<!-- Error -->
<div id="error-screen">
  <div class="err-title">CONNECTION ERROR</div>
  <div class="err-msg" id="error-msg">
    データの取得に失敗しました。<br>
    スプレッドシートが公開設定になっているか確認してください。
  </div>
  <button class="retry-btn" onclick="loadData()">RETRY</button>
</div>

<header>
  <div>
    <div class="logo">MANHOLE ARCHIVE</div>
    <div class="logo-sub">PRIVATE COLLECTION DATABASE</div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE DATA
    </div>
    <div class="stat-pill" id="header-count">---</div>
  </div>
</header>

<div class="container">
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="value" id="stat-total">—</div>
      <div class="label">総数</div>
    </div>
    <div class="hero-stat">
      <div class="value" id="stat-acquired">—</div>
      <div class="label">取得済み</div>
    </div>
    <div class="hero-stat">
      <div class="value" id="stat-prefs">—</div>
      <div class="label">都道府県</div>
    </div>
    <div class="hero-stat">
      <div class="value" id="stat-areas">—</div>
      <div class="label">エリア</div>
    </div>
    <div class="hero-stat">
      <div class="value" id="stat-year">—</div>
      <div class="label">今年の取得</div>
    </div>
  </div>

  <div class="controls">
    <input type="text" class="search-box" id="search" placeholder="🔍  検索: 市区町村、都道府県...">
    <select class="filter-select" id="filter-area">
      <option value="">全エリア</option>
    </select>
    <select class="filter-select" id="filter-pref">
      <option value="">全都道府県</option>
    </select>
    <select class="filter-select" id="filter-acquired">
      <option value="">全カード</option>
      <option value="yes">取得済みのみ</option>
      <option value="no">未取得のみ</option>
    </select>
    <select class="filter-select" id="sort-select">
      <option value="no-asc">No順</option>
      <option value="date-desc">取得日新しい順</option>
      <option value="date-asc">取得日古い順</option>
      <option value="pref-asc">都道府県順</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="view-grid" onclick="setView('grid')" title="グリッド">⊞</button>
      <button class="view-btn" id="view-list" onclick="setView('list')" title="リスト">☰</button>
    </div>
  </div>

  <div id="cards-area"></div>
</div>

<script>
// ===== CONFIG =====
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRayAxX6Aex3K-PPMF5w_5al4vB1Ng_0DHRPCsrXaBcQE6q9WTiNoNuLQIz0MtFgZerMKZzG0ywHGGq/pub?gid=1521643916&single=true&output=csv';

// ===== STATE =====
let allCards = [];
let currentView = 'grid';

// ===== LOADING =====
function setLoading(pct, msg) {
  document.getElementById('loading-bar').style.width = pct + '%';
  document.getElementById('loading-text').textContent = msg;
}

function hideLoading() {
  const el = document.getElementById('loading-screen');
  el.classList.add('hidden');
  setTimeout(() => el.style.display = 'none', 500);
}

function showError(msg) {
  hideLoading();
  const el = document.getElementById('error-screen');
  el.style.display = 'flex';
  if (msg) document.getElementById('error-msg').innerHTML = msg;
}

// ===== FETCH & PARSE CSV =====
async function fetchWithFallback(url) {
  setLoading(30, 'FETCHING FROM GOOGLE SHEETS...');
  const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  if (!text || text.length < 10) throw new Error('Empty response');
  return text;
}

async function loadData() {
  document.getElementById('error-screen').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'flex';
  document.getElementById('loading-screen').classList.remove('hidden');

  setLoading(10, 'CONNECTING TO GOOGLE SHEETS...');

  try {
    const text = await fetchWithFallback(CSV_URL);

    setLoading(70, 'PARSING RECORDS...');
    allCards = parseCSV(text);

    if (allCards.length === 0) throw new Error('No data parsed');

    setLoading(90, 'BUILDING INTERFACE...');
    await new Promise(r => setTimeout(r, 150));

    updateFilters();
    updateStats();
    renderCards();

    setLoading(100, 'COMPLETE');
    await new Promise(r => setTimeout(r, 300));
    hideLoading();

  } catch (e) {
    console.error(e);
    showError(`データの取得に失敗しました。<br><br>
      <span style="font-size:0.7rem; color: var(--danger)">原因: ${e.message}</span><br><br>
      スプレッドシートが「ウェブに公開（CSV）」されているか確認してください。<br>
      ファイル → 共有 → ウェブに公開 → CSV形式`);
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];

  // Skip header row
  const dataLines = lines.slice(1);
  const cards = [];

  for (const line of dataLines) {
    if (!line.trim()) continue;
    const cols = parseCSVLine(line);

    // Columns: No, エリア, 都道府県, 市区町村, 弾数, 配布開始日, コード, ロット, 取得日, 取得年, 譲渡
    const no         = cols[0]?.trim() || '';
    const area       = cols[1]?.trim() || '';
    const pref       = cols[2]?.trim() || '';
    const city       = cols[3]?.trim() || '';
    const dan        = cols[4]?.trim() || '';
    const releaseDate= cols[5]?.trim() || '';
    const code       = cols[6]?.trim() || '';
    const lot        = cols[7]?.trim() || '';
    const acquireDate= cols[8]?.trim() || '';
    const acquireYear= cols[9]?.trim() || '';
    const transfer   = cols[10]?.trim() || '';

    if (!no || !pref) continue;

    cards.push({
      no: parseInt(no) || 0,
      area, pref, city, dan,
      releaseDate, code, lot,
      acquireDate, acquireYear,
      transfer: transfer === '〇',
      acquired: acquireDate !== '',
    });
  }

  return cards;
}

function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuote = false;

  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      result.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

// ===== STATS =====
function updateStats() {
  const total = allCards.length;
  const acquired = allCards.filter(c => c.acquired).length;
  const prefs = new Set(allCards.map(c => c.pref).filter(Boolean)).size;
  const areas = new Set(allCards.map(c => c.area).filter(Boolean)).size;
  const thisYear = new Date().getFullYear() + '年';
  const yearCount = allCards.filter(c => c.acquireYear === thisYear).length;

  document.getElementById('stat-total').textContent = total.toLocaleString();
  document.getElementById('stat-acquired').textContent = acquired.toLocaleString();
  document.getElementById('stat-prefs').textContent = prefs;
  document.getElementById('stat-areas').textContent = areas;
  document.getElementById('stat-year').textContent = yearCount;
  document.getElementById('header-count').textContent = `TOTAL: ${total} CARDS`;
}

// ===== FILTERS =====
function updateFilters() {
  const areas = [...new Set(allCards.map(c => c.area).filter(Boolean))];
  const prefs = [...new Set(allCards.map(c => c.pref).filter(Boolean))].sort((a,b) => a.localeCompare(b,'ja'));

  const areaEl = document.getElementById('filter-area');
  const prefEl = document.getElementById('filter-pref');

  areaEl.innerHTML = '<option value="">全エリア</option>' +
    areas.map(a => `<option value="${a}">${a}</option>`).join('');

  prefEl.innerHTML = '<option value="">全都道府県</option>' +
    prefs.map(p => `<option value="${p}">${p}</option>`).join('');
}

function getFilteredCards() {
  const search = document.getElementById('search').value.toLowerCase();
  const area   = document.getElementById('filter-area').value;
  const pref   = document.getElementById('filter-pref').value;
  const acq    = document.getElementById('filter-acquired').value;
  const sort   = document.getElementById('sort-select').value;

  let cards = allCards.filter(c => {
    const matchSearch = !search ||
      (c.city && c.city.includes(search)) ||
      (c.pref && c.pref.includes(search)) ||
      (c.area && c.area.includes(search)) ||
      (c.code && c.code.toLowerCase().includes(search));
    const matchArea = !area || c.area === area;
    const matchPref = !pref || c.pref === pref;
    const matchAcq  = !acq || (acq === 'yes' ? c.acquired : !c.acquired);
    return matchSearch && matchArea && matchPref && matchAcq;
  });

  cards.sort((a, b) => {
    if (sort === 'no-asc')    return a.no - b.no;
    if (sort === 'date-desc') return (b.acquireDate || '').localeCompare(a.acquireDate || '');
    if (sort === 'date-asc')  return (a.acquireDate || '').localeCompare(b.acquireDate || '');
    if (sort === 'pref-asc')  return (a.pref || '').localeCompare(b.pref || '', 'ja');
    return a.no - b.no;
  });

  return cards;
}

// ===== RENDER =====
function renderCards() {
  const area = document.getElementById('cards-area');
  const cards = getFilteredCards();

  if (cards.length === 0) {
    area.innerHTML = `<div class="empty-state">条件に一致するカードが見つかりません</div>`;
    return;
  }

  const byPref = groupBy(cards, c => c.pref || '未分類');

  if (currentView === 'grid') {
    area.innerHTML = Object.entries(byPref).map(([pref, prefCards]) => {
      const areaName = prefCards[0]?.area || '';
      return `
        <div class="prefecture-section" id="sec-${encodeId(pref)}">
          <div class="prefecture-header" onclick="toggleSection('sec-${encodeId(pref)}')">
            <span class="pref-area">${areaName}</span>
            <span class="prefecture-name">${pref}</span>
            <span class="prefecture-count">${prefCards.length} CARDS</span>
            <span class="collapse-icon">▼</span>
          </div>
          <div class="cards-grid">
            ${prefCards.map(c => gridCard(c)).join('')}
          </div>
        </div>`;
    }).join('');
  } else {
    area.innerHTML = Object.entries(byPref).map(([pref, prefCards]) => {
      const areaName = prefCards[0]?.area || '';
      return `
        <div class="prefecture-section" id="sec-${encodeId(pref)}">
          <div class="prefecture-header" onclick="toggleSection('sec-${encodeId(pref)}')">
            <span class="pref-area">${areaName}</span>
            <span class="prefecture-name">${pref}</span>
            <span class="prefecture-count">${prefCards.length} CARDS</span>
            <span class="collapse-icon">▼</span>
          </div>
          <div class="cards-list">
            ${prefCards.map(c => listCard(c)).join('')}
          </div>
        </div>`;
    }).join('');
  }
}

function gridCard(c) {
  const emoji = getEmoji(c.area);
  const imgSrc = `images/${c.pref}/${c.city}.png`;
  const imgHtml = `<img src="${imgSrc}" alt="${c.city}" onerror="this.style.display='none';this.parentElement.dataset.noimg='1'">`;
  const transferMark = c.transfer ? `<div class="transfer-mark" title="譲渡">TR</div>` : '';
  const acqBadge = c.acquired ? `<span class="badge acquired">取得済</span>` : '';
  const lotBadge = c.lot ? `<span class="badge">LOT:${c.lot}</span>` : '';
  const acquireStr = c.acquireDate ? c.acquireDate : '';

  return `
    <div class="card-item">
      ${transferMark}
      <div class="card-circle">${imgHtml}<span class="card-fallback-emoji" style="position:absolute">${emoji}</span></div>
      <div class="card-city">${c.city}</div>
      <div class="card-code">${c.code} · 第${c.dan}弾</div>
      <div class="card-date">${c.releaseDate || '—'}</div>
      ${acquireStr ? `<div class="card-acquire-date">📅 ${acquireStr}</div>` : ''}
      <div class="card-badges">${acqBadge}${lotBadge}</div>
    </div>`;
}

function listCard(c) {
  const emoji = getEmoji(c.area);
  const imgSrc = `images/${c.pref}/${c.city}.png`;
  const acqBadge = c.acquired ? `<span class="badge acquired">取得済</span>` : '<span class="badge">未取得</span>';
  const transferMark = c.transfer ? `<div class="transfer-mark" style="position:relative;top:unset;right:unset;width:18px;height:18px;font-size:0.5rem;flex-shrink:0" title="譲渡">TR</div>` : '';

  return `
    <div class="list-item" style="position:relative">
      ${c.transfer ? `<div class="transfer-mark">TR</div>` : ''}
      <div class="list-circle">
        <img src="${imgSrc}" alt="${c.city}" style="width:100%;height:100%;object-fit:contain;border-radius:50%;padding:4px;filter:brightness(0.85)" onerror="this.style.display='none'">
        <span style="position:absolute;font-size:1rem">${emoji}</span>
      </div>
      <div>
        <div class="list-city">${c.city}</div>
        <div class="list-meta">
          <span>${c.code}</span>
          <span>第${c.dan}弾</span>
          <span>${c.releaseDate}</span>
          ${acqBadge}
        </div>
      </div>
      <div class="list-right">
        <div class="list-date">${c.acquireDate || '—'}</div>
        ${c.lot ? `<div class="list-lot">LOT:${c.lot}</div>` : ''}
      </div>
    </div>`;
}

function getEmoji(area) {
  const map = {
    '北海道': '❄️', '東北': '🌸', '関東': '🗼',
    '北陸': '⛄', '中部': '🗻', '近畿': '🦌',
    '中国': '⛩️', '四国': '🍊', '九州': '🌋'
  };
  return map[area] || '⊙';
}

function groupBy(arr, fn) {
  return arr.reduce((acc, item) => {
    const key = fn(item);
    if (!acc[key]) acc[key] = [];
    acc[key].push(item);
    return acc;
  }, {});
}

function encodeId(str) {
  return str.replace(/[^\w]/g, '_');
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('collapsed');
}

function setView(v) {
  currentView = v;
  document.getElementById('view-grid').classList.toggle('active', v === 'grid');
  document.getElementById('view-list').classList.toggle('active', v === 'list');
  renderCards();
}

// ===== EVENT LISTENERS =====
document.getElementById('search').addEventListener('input', renderCards);
document.getElementById('filter-area').addEventListener('change', () => {
  // Also update pref filter based on area
  const area = document.getElementById('filter-area').value;
  const prefEl = document.getElementById('filter-pref');
  const prefs = [...new Set(
    allCards.filter(c => !area || c.area === area).map(c => c.pref).filter(Boolean)
  )].sort((a,b) => a.localeCompare(b,'ja'));
  prefEl.innerHTML = '<option value="">全都道府県</option>' +
    prefs.map(p => `<option value="${p}">${p}</option>`).join('');
  renderCards();
});
document.getElementById('filter-pref').addEventListener('change', renderCards);
document.getElementById('filter-acquired').addEventListener('change', renderCards);
document.getElementById('sort-select').addEventListener('change', renderCards);

// ===== INIT =====
loadData();
</script>
</body>
</html>
